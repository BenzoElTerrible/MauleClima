{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-4">
<div class="card shadow">
<div class="card-header bg-dark text-white text-center"><h4> MauleClima — Iniciar sesión</h4></div>
<div class="card-body">
<form method="post">
{% csrf_token %}
<div class="mb-3">
<label class="form-label">Usuario</label>
<input type="text" name="username" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Contraseña</label>
<input type="password" name="password" class="form-control" required>
</div>
<button type="submit" class="btn btn-dark w-100">Ingresar</button>
</form>
<hr>
<p class="text-center">¿No tienes cuenta? <a href="/accounts/registro/">Regístrate</a></p>
</div>
</div>
</div>
</div>
{% endblock %}
