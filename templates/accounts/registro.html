{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-4">
<div class="card shadow">
<div class="card-header bg-dark text-white text-center"><h4>Crear cuenta</h4></div>
<div class="card-body">
<form method="post">
{% csrf_token %}
<div class="mb-3"><label class="form-label">Usuario</label><input type="text" name="username" class="form-control" required></div>
<div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
<div class="mb-3"><label class="form-label">Contraseña</label><input type="password" name="password1" class="form-control" required></div>
<div class="mb-3"><label class="form-label">Confirmar contraseña</label><input type="password" name="password2" class="form-control" required></div>
<button type="submit" class="btn btn-dark w-100">Registrarse</button>
</form>
<hr>
<p class="text-center"><a href="/accounts/login/">Ya tengo cuenta</a></p>
</div>
</div>
</div>
</div>
{% endblock %}
