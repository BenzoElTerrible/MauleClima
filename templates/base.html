<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MauleClima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% if user.is_authenticated %}
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand"> MauleClima</span>
    <div>
        <span class="text-white me-3">{{ user.username }}</span>
        <a href="/accounts/logout/" class="btn btn-sm btn-outline-light">Cerrar sesión</a>
    </div>
</nav>
{% endif %}
<div class="container mt-4">
{% if messages %}
{% for msg in messages %}
<div class="alert alert-{{ msg.tags }} alert-dismissible fade show">{{ msg }}</div>
{% endfor %}
{% endif %}
{% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
